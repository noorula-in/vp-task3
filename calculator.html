<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator </title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .calculator {
            background-color: #1e293b;
            width: 320px;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .display {
            background-color: #0f172a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: right;
            box-shadow: inset 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .previous-calc {
            color: #94a3b8;
            font-size: 1rem;
            min-height: 24px;
            margin-bottom: 5px;
        }

        .current-calc {
            color: #ffffff;
            font-size: 2.8rem;
            font-weight: 300;
            margin: 0;
            overflow: hidden;
            white-space: nowrap;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            border: none;
            outline: none;
            background-color: #334155;
            color: #f8fafc;
            font-size: 1.2rem;
            font-weight: 500;
            padding: 18px 0;
            border-radius: 12px;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-func {
            background-color: #64748b;
            color: #f8fafc;
        }

        .btn-op {
            background-color: #3b82f6;
            color: #ffffff;
            font-size: 1.5rem;
        }

        .btn-equals {
            background-color: #10b981;
            color: #ffffff;
            font-size: 1.5rem;
        }

        .btn-zero {
            grid-column: span 2;
            text-align: left;
            padding-left: 30px;
        }
    </style>
</head>

<body>

    <div class="calculator">
        <div class="display">
            <div class="previous-calc">1,234 + 56</div>
            <div class="current-calc">1,290</div>
        </div>

        <div class="keypad">
            <button class="btn-func">AC</button>
            <button class="btn-func">+/-</button>
            <button class="btn-func">%</button>
            <button class="btn-op">÷</button>

            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="btn-op">×</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="btn-op">−</button>

            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="btn-op">+</button>

            <button class="btn-zero">0</button>
            <button>.</button>
            <button class="btn-equals">=</button>
        </div>
    </div>

</body>

</html>
